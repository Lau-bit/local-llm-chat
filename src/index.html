<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:">
  <title>Local LLM Chat</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body spellcheck="false">
  <div id="app">
    <header id="titlebar" data-tauri-drag-region>
      <div id="titlebar-brand" data-tauri-drag-region>
        <span class="titlebar-sigil" aria-hidden="true">◈</span>
        <span data-tauri-drag-region>Local LLM Chat</span>
        <span id="server-status" class="server-status" title="Server status"></span>
      </div>
      <div id="titlebar-window-controls">
        <button class="titlebar-window-btn" id="titlebar-minimize" title="Minimize" aria-label="Minimize">
          <svg width="12" height="12" viewBox="0 0 12 12" aria-hidden="true">
            <path d="M2 6.5h8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="titlebar-window-btn" id="titlebar-maximize" title="Maximize" aria-label="Maximize">
          <svg width="12" height="12" viewBox="0 0 12 12" aria-hidden="true">
            <rect x="3" y="3" width="6" height="6" fill="none" stroke="currentColor" stroke-width="1.2"/>
          </svg>
        </button>
        <button class="titlebar-window-btn titlebar-close" id="titlebar-close" title="Close" aria-label="Close">
          <svg width="12" height="12" viewBox="0 0 12 12" aria-hidden="true">
            <path d="M3 3l6 6M9 3L3 9" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </header>

    <div id="main-area">
      <div id="sidebar-area">
        <aside id="sidebar">
          <button id="new-chat-btn">+ New Chat</button>
          <div id="chat-list"></div>
          <div id="sidebar-footer">
            <select id="model-select" title="Select model"></select>
            <button id="settings-btn" title="Settings">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
              </svg>
            </button>
          </div>
        </aside>
        <button id="sidebar-toggle" title="Toggle sidebar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/>
          </svg>
        </button>
        <div id="sidebar-read-marker" class="hidden"></div>
        <button id="floating-new-chat" class="hidden" title="New chat">+</button>
        <button id="floating-settings-btn" class="hidden" title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <div id="floating-model-controls" class="hidden">
          <select id="floating-model-select" title="Select model"></select>
        </div>
      </div>

      <div id="settings-panel" class="hidden">
        <div id="settings-titlebar">
          <span>Settings</span>
          <button id="settings-close">&times;</button>
        </div>
        <div id="settings-tabs" role="tablist" aria-label="Settings sections">
          <button class="settings-tab" data-settings-tab="setup" role="tab" aria-selected="false">Setup</button>
          <button class="settings-tab active" data-settings-tab="general" role="tab" aria-selected="true">General</button>
          <button class="settings-tab" data-settings-tab="models" role="tab" aria-selected="false">Models</button>
        </div>
        <div id="settings-body">
          <section class="settings-pane" data-settings-pane="setup" role="tabpanel">
            <div id="setup-checklist"></div>
          </section>

          <section class="settings-pane active" data-settings-pane="general" role="tabpanel">
            <label class="settings-label">Server URL</label>
            <div class="settings-server-row">
              <input type="text" id="settings-server-url" placeholder="http://localhost:1234" spellcheck="false">
              <button id="settings-server-connect">Connect</button>
            </div>

            <label class="settings-label">Context window (tokens)</label>
            <div class="settings-row">
              <input type="number" id="settings-ctx-window" min="512" max="2097152" step="512" placeholder="auto">
              <span class="settings-hint">override if not detected</span>
            </div>

            <label class="settings-label">System prompt</label>
            <textarea id="settings-system-prompt" placeholder="You are a helpful assistant." rows="3" spellcheck="false"></textarea>

            <label class="settings-label">Temperature</label>
            <div class="settings-row">
              <input type="range" id="settings-temp" min="0" max="2" step="0.05" value="0.7">
              <span id="settings-temp-value">0.70</span>
              <button id="settings-temp-reset" class="settings-icon-btn" title="Reset temperature to 0.70" aria-label="Reset temperature">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <polyline points="23 4 23 10 17 10"></polyline>
                  <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
              </button>
            </div>

            <label class="settings-label">Max tokens <span class="settings-hint">(0 = unlimited)</span></label>
            <div class="settings-row">
              <input type="number" id="settings-max-tokens" min="0" max="131072" step="256" value="0">
            </div>

            <label class="settings-label">Web search (Exa)</label>
            <div class="settings-server-row">
              <input type="password" id="settings-exa-key" placeholder="Exa API key" spellcheck="false" autocomplete="off">
            </div>
            <div class="settings-row">
              <input type="number" id="settings-exa-results" min="1" max="10" step="1" value="5">
              <span class="settings-hint">results to fetch (1–10)</span>
            </div>

            <label class="settings-label">Theme</label>
            <div class="theme-options">
              <button class="theme-btn" data-theme="amber">
                <span class="theme-dot amber"></span>
                Amber
              </button>
              <button class="theme-btn" data-theme="cyan">
                <span class="theme-dot cyan"></span>
                Cyan
              </button>
              <button class="theme-btn" data-theme="space">
                <span class="theme-dot space"></span>
                Space
              </button>
              <button class="theme-btn" data-theme="green">
                <span class="theme-dot green"></span>
                Green
              </button>
              <button class="theme-btn" data-theme="light">
                <span class="theme-dot light"></span>
                Light
              </button>
            </div>

            <label class="settings-label">Message max width</label>
            <div class="settings-row">
              <input type="range" id="msg-width-slider" min="40" max="100" step="5" value="85">
              <span id="msg-width-value">85%</span>
            </div>
            <div class="settings-presets">
              <button class="preset-btn" data-value="50">Narrow</button>
              <button class="preset-btn" data-value="75">Medium</button>
              <button class="preset-btn" data-value="85">Wide</button>
              <button class="preset-btn" data-value="100">Full</button>
            </div>

            <label class="settings-label">Read marker</label>
            <label class="settings-toggle">
              <input type="checkbox" id="settings-read-marker">
              <span class="settings-toggle-slider"></span>
              <span class="settings-toggle-text">Click to place marker</span>
            </label>

            <button id="settings-hidden-chats" class="settings-action-btn">Hidden chats</button>
            <button id="settings-dev-console" class="settings-action-btn">Developer Console [§]</button>
          </section>

          <section class="settings-pane" data-settings-pane="models" role="tabpanel">
            <div class="model-settings-header">
              <select id="settings-model-select" title="Model settings"></select>
              <button id="settings-model-refresh" title="Refresh models">Refresh</button>
            </div>
            <label class="settings-label">Fallback image analysis model</label>
            <select id="settings-image-analysis-model" title="Image analysis model"></select>
            <label class="settings-toggle">
              <input type="checkbox" id="settings-use-current-image-analysis">
              <span class="settings-toggle-slider"></span>
              <span class="settings-toggle-text">Use current trusted vision model for image analysis</span>
            </label>
            <label class="settings-toggle">
              <input type="checkbox" id="settings-include-image-analysis-context">
              <span class="settings-toggle-slider"></span>
              <span class="settings-toggle-text">Include saved image analysis in chat context</span>
            </label>
            <div id="settings-model-details" class="model-settings-details"></div>
          </section>
        </div>
      </div>

      <div id="chat-container">
        <div id="branch-bar"></div>
        <div id="search-bar" class="hidden">
          <input type="text" id="search-input" placeholder="Find in chat..." spellcheck="false">
          <span id="search-count"></span>
          <button id="search-prev" title="Previous">&uarr;</button>
          <button id="search-next" title="Next">&darr;</button>
          <button id="search-close" title="Close">&times;</button>
        </div>
        <div id="messages"></div>
        <button id="scroll-top-btn" title="Scroll to top">▲</button>
        <button id="scroll-bottom-btn" title="Scroll to bottom">▼</button>
      </div>
    </div>

    <div id="input-bar">
      <div id="image-preview" class="hidden">
        <div id="image-preview-list"></div>
        <label id="image-analysis-toggle" title="Analyze pasted images into text before sending them to the active chat model">
          <input type="checkbox" id="image-analysis-before-send">
          <span>Analyze images into text first</span>
        </label>
        <button id="image-preview-clear" title="Remove all images">&times;</button>
      </div>
      <div id="composer-main-row">
        <button id="web-search-toggle" title="Web search (Exa) — off" aria-pressed="false">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
          </svg>
        </button>
        <textarea id="message-input" placeholder="Type a message..." rows="1" spellcheck="false"></textarea>
        <button id="send-btn">Send</button>
      </div>
      <div id="context-bar">
        <div id="context-bar-fill"></div>
        <span id="context-bar-label">CTX —</span>
      </div>
    </div>

    <div id="dev-console" class="hidden">
      <div id="dev-console-titlebar">
        <span>Developer Console</span>
        <div id="dev-console-actions">
          <button id="dev-console-clear" title="Clear logs">Clear</button>
          <button id="dev-console-close" title="Close">&times;</button>
        </div>
      </div>
      <div id="dev-console-body">
        <div id="dev-console-info"></div>
        <div id="dev-console-logs"></div>
      </div>
    </div>
  </div>

  <script src="marked.umd.js"></script>
  <script src="tauri-api.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
